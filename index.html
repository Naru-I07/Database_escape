<!DOCTYPE html>
<html>
<head>
<title>DB Escape FPS</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }

/* ===== MENU ===== */
#menu{
position:absolute;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

#menuContent{
width:80%;
display:flex;
justify-content:space-between;
}

#leftMenu{
text-align:center;
}

#leftMenu h1{
font-size:60px;
margin-bottom:30px;
}

#playBtn{
padding:15px 40px;
font-size:20px;
cursor:pointer;
border:none;
background:#2196f3;
color:white;
}

#rightMenu{
width:40%;
font-size:18px;
line-height:30px;
}

#creator{
margin-top:40px;
font-weight:bold;
}

/* ===== UI ===== */
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
display:none;
}

#completion{
position:absolute;
top:10px;
right:10px;
color:white;
display:none;
}

#questionBox{
position:absolute;
top:20%;
left:30%;
width:40%;
background:white;
padding:20px;
display:none;
}
</style>
</head>
<body>

<!-- ===== MENU ===== -->
<div id="menu">
<div id="menuContent">
<div id="leftMenu">
<h1>DB Escape</h1>
<button id="playBtn">PLAY</button>
</div>

<div id="rightMenu">
<h2>Manual</h2>
W A S D - Move<br>
Shift - Run<br>
Space - Jump<br>
E - Interact<br>
A / B / C - Answer<br>

<div id="creator">
Creator = Muhammad Nasrullah Fitri
</div>
</div>
</div>
</div>

<!-- ===== GAME UI ===== -->
<div id="ui">
Score: <span id="score">0</span>
</div>

<div id="completion">
Completed: <span id="done">0</span>/8
</div>

<div id="questionBox">
<h3 id="question"></h3>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ===== MENU LOGIC =====
let gameStarted = false;

document.getElementById("playBtn").onclick = function(){
document.getElementById("menu").style.display="none";
document.getElementById("ui").style.display="block";
document.getElementById("completion").style.display="block";
document.body.requestPointerLock();
gameStarted = true;
};

// ===== THREE SETUP =====
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let player = new THREE.Group();
scene.add(player);
player.position.set(0,2,10);
player.add(camera);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));
let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,30,10);
scene.add(light);

// ===== FLOOR =====
let floor=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x444444})
);
floor.rotation.x=Math.PI/2;
scene.add(floor);

// ===== WALLS =====
let wallMaterial=new THREE.MeshStandardMaterial({color:0x2196f3});
let walls=[];

function createWall(x,y,z,w,h,d){
let wall=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),wallMaterial);
wall.position.set(x,y,z);
scene.add(wall);
walls.push(wall);
}

createWall(0,5,-100,200,10,2);
createWall(0,5,100,200,10,2);
createWall(-100,5,0,2,10,200);
createWall(100,5,0,2,10,200);

// ===== TEACHER =====
let teacherTexture=new THREE.TextureLoader().load("teacher.png");
let teacher=new THREE.Sprite(new THREE.SpriteMaterial({map:teacherTexture}));
teacher.scale.set(4,6,1);
teacher.position.set(0,3,-15);
scene.add(teacher);

let teacherActive=false;
let teacherSpeed=0.02;

// ===== QUESTIONS =====
let questions=[
{q:"Primary key must be?",o:["Duplicate","Unique","Null"],a:1},
{q:"Which command retrieves data?",o:["SELECT","DROP","DELETE"],a:0},
{q:"Which clause filters rows?",o:["GROUP BY","WHERE","ORDER BY"],a:1},
{q:"Which command removes a table?",o:["DELETE","REMOVE","DROP"],a:2},
{q:"COUNT() is used to?",o:["Sort rows","Delete rows","Count rows"],a:2},
{q:"ORDER BY is used to?",o:["Join tables","Sort results","Delete data"],a:1},
{q:"Which SQL command updates data?",o:["MODIFY","UPDATE","CHANGE"],a:1},
{q:"Foreign key links to?",o:["Primary key","Unique key","Index"],a:0}
];

let totalQuestions=questions.length;
let laptops=[];
let score=0;
let currentQuestion=null;
let interactCooldown=false;

// ===== LAPTOPS =====
let laptopTexture=new THREE.TextureLoader().load("laptop.png");

questions.forEach((q,i)=>{
let laptop=new THREE.Sprite(new THREE.SpriteMaterial({map:laptopTexture}));
laptop.scale.set(3,2,1);
laptop.position.set((Math.random()*160)-80,1.5,(Math.random()*160)-80);
laptop.userData.question=q;
scene.add(laptop);
laptops.push(laptop);
});

// ===== CONTROLS =====
let moveForward=false, moveBackward=false, moveLeft=false, moveRight=false, sprint=false;
let gravity=0.01, yVelocity=0, isOnGround=true;

document.addEventListener("mousemove",(e)=>{
if(document.pointerLockElement===document.body && gameStarted){
camera.rotation.y-=e.movementX*0.002;
}
});

document.addEventListener("keydown",(e)=>{

if(!gameStarted) return;

if(!currentQuestion){
if(e.key==="w") moveForward=true;
if(e.key==="s") moveBackward=true;
if(e.key==="a") moveLeft=true;
if(e.key==="d") moveRight=true;
if(e.key==="Shift") sprint=true;
if(e.key==="e") interact();
}

if(currentQuestion){
if(e.key.toLowerCase()==="a") checkAnswer(0);
if(e.key.toLowerCase()==="b") checkAnswer(1);
if(e.key.toLowerCase()==="c") checkAnswer(2);
}

});

document.addEventListener("keyup",(e)=>{
if(e.key==="w") moveForward=false;
if(e.key==="s") moveBackward=false;
if(e.key==="a") moveLeft=false;
if(e.key==="d") moveRight=false;
if(e.key==="Shift") sprint=false;
});

// ===== INTERACT =====
function interact(){
if(interactCooldown) return;

laptops.forEach((l,i)=>{
if(player.position.distanceTo(l.position)<3){
askQuestion(l,i);
interactCooldown=true;
setTimeout(()=>{interactCooldown=false;},2000);
}
});
}

// ===== ASK =====
function askQuestion(laptop,index){
let q=laptop.userData.question;
currentQuestion={correct:q.a,laptop:laptop,index:index};

document.getElementById("question").innerHTML=
q.q+"<br><br>"+
"A) "+q.o[0]+"<br>"+
"B) "+q.o[1]+"<br>"+
"C) "+q.o[2];

document.getElementById("questionBox").style.display="block";
}

// ===== CHECK =====
function checkAnswer(index){
if(!currentQuestion) return;

if(index===currentQuestion.correct){
score+=10;
document.getElementById("score").innerText=score;

scene.remove(currentQuestion.laptop);
laptops.splice(currentQuestion.index,1);
document.getElementById("done").innerText=totalQuestions-laptops.length;
}else{
teacherActive=true; // permanent aggro
}

currentQuestion=null;
document.getElementById("questionBox").style.display="none";
}

// ===== ANIMATE =====
function animate(){
requestAnimationFrame(animate);

if(!gameStarted){
renderer.render(scene,camera);
return;
}

let moveSpeed=sprint?0.3:0.15;
let forward=new THREE.Vector3();
camera.getWorldDirection(forward);
forward.y=0;
forward.normalize();

let right=new THREE.Vector3();
right.crossVectors(forward,new THREE.Vector3(0,1,0)).normalize();

if(moveForward) player.position.add(forward.clone().multiplyScalar(moveSpeed));
if(moveBackward) player.position.add(forward.clone().multiplyScalar(-moveSpeed));
if(moveRight) player.position.add(right.clone().multiplyScalar(moveSpeed));
if(moveLeft) player.position.add(right.clone().multiplyScalar(-moveSpeed));

if(teacherActive){
teacher.position.x+=(player.position.x-teacher.position.x)*teacherSpeed;
teacher.position.z+=(player.position.z-teacher.position.z)*teacherSpeed;

if(player.position.distanceTo(teacher.position)<2){
alert("Caught! Score: "+score);
location.reload();
}
}

renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
