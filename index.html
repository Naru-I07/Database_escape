<!DOCTYPE html>
<html>
<head>
<title>DB Escape FPS</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }

/* ===== MENU ===== */
#menu{
position:absolute;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

#menuContent{
width:80%;
display:flex;
justify-content:space-between;
}

#leftMenu{text-align:center;}
#leftMenu h1{font-size:60px;margin-bottom:30px;}

#playBtn{
padding:15px 40px;
font-size:20px;
cursor:pointer;
border:none;
background:#2196f3;
color:white;
}

#rightMenu{
width:40%;
font-size:18px;
line-height:30px;
}

#creator{margin-top:40px;font-weight:bold;}

/* ===== UI ===== */
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
display:none;
font-size:20px;
}

#completion{
position:absolute;
top:10px;
right:10px;
color:white;
display:none;
font-size:20px;
}

#countdown{
position:absolute;
top:50px;
right:10px;
color:yellow;
display:none;
font-size:20px;
}

#tutorialMsg{
position:absolute;
top:40%;
width:100%;
text-align:center;
color:white;
font-size:28px;
display:none;
}

#questionBox{
position:absolute;
top:20%;
left:30%;
width:40%;
background:white;
padding:20px;
display:none;
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
<div id="menuContent">
<div id="leftMenu">
<h1>DB Escape</h1>
<button id="playBtn">PLAY</button>
</div>

<div id="rightMenu">
<h2>Manual</h2>
W A S D - Move<br>
Shift - Run<br>
E - Interact<br>
A / B / C - Answer<br>
Space - Jump<br>
<div id="creator">Creator = Muhammad Nasrullah Fitri K1T1 25/26 CD125 topic 1.5</div>
</div>
</div>
</div>

<!-- GAME UI -->
<div id="ui">Score: <span id="score">0</span></div>
<div id="completion">Completed: <span id="done">0</span>/0</div>
<div id="countdown"></div>
<div id="tutorialMsg"></div>
<div id="questionBox"><h3 id="question"></h3></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let player = new THREE.Group();
scene.add(player);
player.position.set(0,2,20);
player.add(camera);

scene.add(new THREE.AmbientLight(0xffffff,0.6));
let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,30,10);
scene.add(light);

/* ===== BIGGER CLASSROOM ===== */
let floor=new THREE.Mesh(
new THREE.PlaneGeometry(400,400),
new THREE.MeshStandardMaterial({color:0x444444})
);
floor.rotation.x=Math.PI/2;
scene.add(floor);

let wallMat=new THREE.MeshStandardMaterial({color:0x2196f3});
function wall(x,y,z,w,h,d){
let m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),wallMat);
m.position.set(x,y,z);
scene.add(m);
}
wall(0,5,-200,400,10,2);
wall(0,5,200,400,10,2);
wall(-200,5,0,2,10,400);
wall(200,5,0,2,10,400);

/* ===== TEACHER ===== */
let teacherTexture=new THREE.TextureLoader().load("teacher.png");
let teacher=new THREE.Sprite(new THREE.SpriteMaterial({map:teacherTexture}));
teacher.scale.set(4,6,1);
teacher.position.set(0,3,-30);
scene.add(teacher);

let teacherActive=false;
let teacherSpeed=0.0109; // slower

/* ===== QUESTIONS ===== */
let questions=[
{q:"Primary key must be?",o:["Duplicate","Unique","Null"],a:1},
{q:"Which clause filters rows?",o:["GROUP BY","WHERE","ORDER BY"],a:1},
{q:"Which command removes table?",o:["DELETE","REMOVE","DROP"],a:2},
{q:"Which joins returns all records?",o:["INNER","LEFT","RIGHT"],a:1},
{q:"Which normal form removes partial dependency?",o:["1NF","2NF","3NF"],a:1},
{q:"SQL stands for?",o:["Structured Query Language","Simple Query Logic","System Query Link"],a:0},
{q:"Which command inserts data?",o:["PUT","INSERT","ADD"],a:1},
{q:"Foreign key links to?",o:["Primary Key","Index","View"],a:0}
];

let laptops=[];
let score=0;
let currentQuestion=null;
let interactCooldown=false;

document.getElementById("completion").innerHTML =
"Completed: <span id='done'>0</span>/"+questions.length;

let laptopTexture=new THREE.TextureLoader().load("laptop.png");

questions.forEach((q)=>{
let laptop=new THREE.Sprite(new THREE.SpriteMaterial({map:laptopTexture}));
laptop.scale.set(3,2,1);
laptop.position.set((Math.random()*350)-175,1.5,(Math.random()*350)-175);
laptop.userData.question=q;
scene.add(laptop);
laptops.push(laptop);
});

/* ===== CONTROLS ===== */
let keys={};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()]=true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()]=false;
});

document.addEventListener("mousemove",(e)=>{
if(document.pointerLockElement===document.body){
camera.rotation.y-=e.movementX*0.002;
}
});

/* ===== MENU START ===== */
document.getElementById("playBtn").onclick=function(){
document.getElementById("menu").style.display="none";
document.getElementById("ui").style.display="block";
document.getElementById("completion").style.display="block";
document.getElementById("countdown").style.display="block";
document.body.requestPointerLock();

let tutorialTime=10;
let countdownDisplay=document.getElementById("countdown");
countdownDisplay.innerText="Teacher runs in: "+tutorialTime;

let timer=setInterval(()=>{
tutorialTime--;
countdownDisplay.innerText="Teacher runs in: "+tutorialTime;
if(tutorialTime<=0){
clearInterval(timer);
countdownDisplay.innerText="Teacher is chasing!";
teacherActive=true;
}
},1000);
};

/* ===== INTERACT ===== */
function interact(){
if(interactCooldown) return;

laptops.forEach((l,i)=>{
if(player.position.distanceTo(l.position)<4){
askQuestion(l,i);
interactCooldown=true;
setTimeout(()=>{interactCooldown=false;},2000);
}
});
}

function askQuestion(laptop,index){
let q=laptop.userData.question;
currentQuestion={correct:q.a,laptop:laptop,index:index};

document.getElementById("question").innerHTML=
q.q+"<br><br>A) "+q.o[0]+"<br>B) "+q.o[1]+"<br>C) "+q.o[2];

document.getElementById("questionBox").style.display="block";
}

function checkAnswer(index){
if(!currentQuestion) return;

if(index===currentQuestion.correct){
score+=10;
document.getElementById("score").innerText=score;

scene.remove(currentQuestion.laptop);
laptops.splice(currentQuestion.index,1);
document.getElementById("done").innerText=questions.length-laptops.length;

if(laptops.length===0){
alert("YOU ESCAPED! Final Score: "+score);
location.reload();
}

}else{
teacherActive=true; // permanent aggro
}

currentQuestion=null;
document.getElementById("questionBox").style.display="none";
}

/* ===== MAIN LOOP ===== */
function animate(){
requestAnimationFrame(animate);

let moveSpeed = keys["shift"] ? 0.35 : 0.18;

let forward=new THREE.Vector3();
camera.getWorldDirection(forward);
forward.y=0;
forward.normalize();

let right=new THREE.Vector3();
right.crossVectors(forward,new THREE.Vector3(0,1,0)).normalize();

if(keys["w"]) player.position.add(forward.clone().multiplyScalar(moveSpeed));
if(keys["s"]) player.position.add(forward.clone().multiplyScalar(-moveSpeed));
if(keys["d"]) player.position.add(right.clone().multiplyScalar(moveSpeed));
if(keys["a"]) player.position.add(right.clone().multiplyScalar(-moveSpeed));

if(keys["e"]) interact();

if(currentQuestion){
if(keys["a"]) checkAnswer(0);
if(keys["b"]) checkAnswer(1);
if(keys["c"]) checkAnswer(2);
}

if(teacherActive){
teacher.position.x+=(player.position.x-teacher.position.x)*teacherSpeed;
teacher.position.z+=(player.position.z-teacher.position.z)*teacherSpeed;

if(player.position.distanceTo(teacher.position)<2){
alert("Caught! Score: "+score);
location.reload();
}
}

renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
